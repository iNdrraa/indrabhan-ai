name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Inject Web3Forms Access Key
        env:
          WEB3FORMS_ACCESS_KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}
        run: |
          if [ -z "$WEB3FORMS_ACCESS_KEY" ]; then
            echo "::error::Secret WEB3FORMS_ACCESS_KEY is empty. Add it under Repo Settings → Secrets and variables → Actions, or under the github-pages Environment secrets if you use that."
            exit 1
          fi
          python3 << 'PY'
          import os
          key = os.environ["WEB3FORMS_ACCESS_KEY"]
          token = "{{WEB3FORMS_ACCESS_KEY}}"
          for name in ("index.html", "hire-me.html"):
              try:
                  with open(name, encoding="utf-8") as f:
                      text = f.read()
              except FileNotFoundError:
                  continue
              if token in text:
                  with open(name, "w", encoding="utf-8") as f:
                      f.write(text.replace(token, key))
          PY
          if grep -q '{{WEB3FORMS_ACCESS_KEY}}' index.html hire-me.html 2>/dev/null; then
            echo "::error::Placeholder was not replaced in HTML. Check index.html and hire-me.html paths in the repo root."
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
