name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Inject Formspree endpoint from secret
        env:
          FORMSPREE_ENDPOINT: ${{ secrets.FORMSPREE_ENDPOINT }}
        run: |
          if [ -z "$FORMSPREE_ENDPOINT" ]; then
            echo "::error::Add secret FORMSPREE_ENDPOINT (full URL, e.g. https://formspree.io/f/xxxx) under Settings → Secrets and variables → Actions. If the job uses the github-pages environment, add the same secret under Settings → Environments → github-pages."
            exit 1
          fi
          python3 << 'PY'
          import os
          url = os.environ["FORMSPREE_ENDPOINT"].strip()
          token = "__INJECT_FORMSPREE_URL__"
          path = "js/contact-forms.js"
          with open(path, encoding="utf-8") as f:
              text = f.read()
          if token not in text:
              raise SystemExit("Inject marker __INJECT_FORMSPREE_URL__ missing in js/contact-forms.js")
          if text.count(token) != 1:
              raise SystemExit("Expected exactly one inject marker in js/contact-forms.js")
          with open(path, "w", encoding="utf-8") as f:
              f.write(text.replace(token, url))
          PY
          if grep -q '__INJECT_FORMSPREE_URL__' js/contact-forms.js; then
            echo "::error::Formspree URL was not injected."
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
